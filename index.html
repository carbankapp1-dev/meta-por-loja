<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel GCM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===================== TELA DE LOGIN ===================== -->
<div id="tela-login" class="tela-login">
  <div class="login-card">
    <div class="login-logo">Painel <span>GCM</span></div>
    <p class="login-sub">Acompanhamento comercial por loja</p>
    <form id="form-login">
      <label for="login-usuario">Usuário</label>
      <input type="text" id="login-usuario" autocomplete="username" required>
      <label for="login-senha">Senha</label>
      <input type="password" id="login-senha" autocomplete="current-password" required>
      <button type="submit" id="btn-login">Entrar</button>
      <p id="login-erro" class="login-erro"></p>
    </form>
  </div>
</div>

<!-- ===================== PAINEL ===================== -->
<div id="app" class="app oculto">

  <header class="topbar">
    <div class="topbar-titulo">Painel <span>GCM</span></div>
    <div class="topbar-usuario">
      <span id="usuario-info"></span>
      <button id="btn-logout">Sair</button>
    </div>
  </header>

  <section id="barra-uploads" class="barra-uploads oculto">
    <span class="uploads-label">Uploads (admin):</span>
    <label class="btn-upload">
      Lojas
      <input type="file" id="upload-lojas" accept=".xlsx,.xls" hidden>
    </label>
    <label class="btn-upload">
      Potencial
      <input type="file" id="upload-potencial" accept=".xlsx,.xls" hidden>
    </label>
    <label class="btn-upload">
      Atualizar M1
      <input type="file" id="upload-m1" accept=".xlsx,.xls" hidden>
    </label>
    <label class="btn-upload">
      Atualizar M2
      <input type="file" id="upload-m2" accept=".xlsx,.xls" hidden>
    </label>
    <label class="btn-upload">
      Atualizar M3
      <input type="file" id="upload-m3" accept=".xlsx,.xls" hidden>
    </label>
    <label class="btn-upload btn-upload-destaque">
      Novo Mês
      <input type="file" id="upload-novo-mes" accept=".xlsx,.xls" hidden>
    </label>
    <span id="upload-status" class="upload-status"></span>
  </section>

  <section class="filtros">
    <input type="text" id="filtro-busca" placeholder="Buscar por loja, DN, GCM, coordenador ou regional...">
    <span id="contador-lojas" class="contador-lojas"></span>
  </section>

  <main class="tabela-area">
    <div id="scroll-topo" class="scroll-topo">
      <div id="scroll-topo-interno" class="scroll-topo-interno"></div>
    </div>
    <div id="tabela-wrap" class="tabela-wrap">
      <table id="tabela-lojas">
        <thead>
          <tr>
            <th class="col-fixa col-dn" data-col="dn">DN</th>
            <th class="col-fixa col-nome" data-col="nome_loja">Nome da Loja</th>
            <th data-col="gcm">GCM</th>
            <th data-col="gravames_mercado">Gravames Mercado</th>
            <th data-col="potencial">Potencial de Mercado</th>
            <th data-col="m3">M3</th>
            <th data-col="m2">M2</th>
            <th data-col="m1">M1</th>
            <th data-col="meta">Meta</th>
          </tr>
        </thead>
        <tbody id="tabela-corpo">
          <tr><td colspan="9" class="carregando">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/parse.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/uploads.js"></script>
<script src="js/app.js"></script>
</body>
</html>
