<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel GCM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===================== TELA DE LOGIN ===================== -->
<div id="tela-login" class="tela-login">
  <div class="login-card">
    <div class="login-logo">Painel <span>GCM</span></div>
    <p class="login-sub">Acompanhamento comercial por loja</p>
    <form id="form-login">
      <label for="login-usuario">Usuário</label>
      <input type="text" id="login-usuario" autocomplete="username" required>
      <label for="login-senha">Senha</label>
      <input type="password" id="login-senha" autocomplete="current-password" required>
      <button type="submit" id="btn-login">Entrar</button>
      <p id="login-erro" class="login-erro"></p>
    </form>
  </div>
</div>

<!-- ===================== PAINEL ===================== -->
<div id="app" class="app oculto">

  <header class="topbar">
    <div class="topbar-titulo">Painel <span>GCM</span></div>
    <div class="topbar-usuario">
      <span id="usuario-info"></span>
      <span class="topbar-separador">·</span>
      <span id="contador-lojas" class="contador-lojas"></span>
    </div>
    <div class="topbar-espaco"></div>
    <input type="text" id="filtro-busca" class="topbar-busca" placeholder="Buscar por...">
    <button id="btn-logout">Sair</button>
  </header>

  <section id="barra-uploads" class="barra-uploads oculto">
    <span class="uploads-label">Uploads (admin):</span>
    <label class="btn-upload">
      Lojas
      <input type="file" id="upload-lojas" accept=".xlsx,.xls" hidden>
    </label>
    <label class="btn-upload">
      Potencial
      <input type="file" id="upload-potencial" accept=".xlsx,.xls" hidden>
    </label>
    <label class="btn-upload">
      Atualizar M1
      <input type="file" id="upload-m1" accept=".xlsx,.xls" hidden>
    </label>
    <label class="btn-upload">
      Atualizar M2
      <input type="file" id="upload-m2" accept=".xlsx,.xls" hidden>
    </label>
    <label class="btn-upload">
      Atualizar M3
      <input type="file" id="upload-m3" accept=".xlsx,.xls" hidden>
    </label>
    <label class="btn-upload btn-upload-destaque">
      Novo Mês
      <input type="file" id="upload-novo-mes" accept=".xlsx,.xls" hidden>
    </label>
    <span id="upload-status" class="upload-status"></span>
  </section>

  <main class="tabela-area">
    <div id="scroll-topo" class="scroll-topo">
      <div id="scroll-topo-interno" class="scroll-topo-interno"></div>
    </div>
    <div id="tabela-wrap" class="tabela-wrap">
      <table id="tabela-lojas">
        <thead>
          <tr>
            <th class="col-fixa col-dn" data-col="dn">
              <div class="th-linha">
                <span class="th-titulo">DN</span>
                <button type="button" class="th-filtro" data-col="dn" title="Filtrar DN">▾</button>
              </div>
            </th>
            <th class="col-fixa col-nome" data-col="nome_loja">
              <div class="th-linha">
                <span class="th-titulo">Nome da Loja</span>
                <button type="button" class="th-filtro" data-col="nome_loja" title="Filtrar Nome da Loja">▾</button>
              </div>
            </th>
            <th data-col="gcm">
              <div class="th-linha">
                <span class="th-titulo">GCM</span>
                <button type="button" class="th-filtro" data-col="gcm" title="Filtrar GCM">▾</button>
              </div>
            </th>
            <th data-col="gravames_mercado">
              <div class="th-linha">
                <span class="th-titulo">Gravames Mercado</span>
                <button type="button" class="th-filtro" data-col="gravames_mercado" title="Filtrar Gravames Mercado">▾</button>
              </div>
            </th>
            <th data-col="potencial">
              <div class="th-linha">
                <span class="th-titulo">Potencial de Mercado</span>
                <button type="button" class="th-filtro" data-col="potencial" title="Filtrar Potencial de Mercado">▾</button>
              </div>
            </th>
            <th data-col="m3">
              <div class="th-linha">
                <span class="th-titulo">M3</span>
                <button type="button" class="th-filtro" data-col="m3" title="Filtrar M3">▾</button>
              </div>
              <div class="th-mes" id="mes-m3"></div>
              <div class="th-soma" id="soma-m3"></div>
            </th>
            <th data-col="m2">
              <div class="th-linha">
                <span class="th-titulo">M2</span>
                <button type="button" class="th-filtro" data-col="m2" title="Filtrar M2">▾</button>
              </div>
              <div class="th-mes" id="mes-m2"></div>
              <div class="th-soma" id="soma-m2"></div>
            </th>
            <th data-col="m1">
              <div class="th-linha">
                <span class="th-titulo">M1</span>
                <button type="button" class="th-filtro" data-col="m1" title="Filtrar M1">▾</button>
              </div>
              <div class="th-mes" id="mes-m1"></div>
              <div class="th-soma" id="soma-m1"></div>
            </th>
            <th data-col="meta">
              <div class="th-linha">
                <span class="th-titulo">Meta</span>
                <button type="button" class="th-filtro" data-col="meta" title="Filtrar Meta">▾</button>
              </div>
              <div class="th-soma" id="soma-meta"></div>
            </th>
          </tr>
        </thead>
        <tbody id="tabela-corpo">
          <tr><td colspan="9" class="carregando">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

</div>

<!-- Painel de filtro compartilhado (estilo Excel), reaproveitado para qualquer coluna -->
<div id="painel-filtro" class="painel-filtro oculto">
  <input type="text" id="filtro-pesquisa-coluna" placeholder="Pesquisar...">
  <div class="filtro-acoes-topo">
    <button type="button" id="filtro-selecionar-tudo">Selecionar tudo</button>
    <button type="button" id="filtro-limpar-tudo">Limpar</button>
  </div>
  <div id="filtro-lista-valores" class="filtro-lista-valores"></div>
  <div class="filtro-acoes-rodape">
    <button type="button" id="filtro-cancelar">Cancelar</button>
    <button type="button" id="filtro-aplicar" class="filtro-aplicar">OK</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/parse.js"></script>
<script src="js/auth.js"></script>
<script src="js/filtros.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/uploads.js"></script>
<script src="js/app.js"></script>
</body>
</html>
